name: NetlifyStatusBar
options:
  bundleIdPrefix: com.azwandi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.7.0

targets:
  NetlifyStatusBar:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: NetlifyStatusBar
        excludes:
          - "**/*.gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.azwandi.NetlifyStatusBar
        INFOPLIST_FILE: NetlifyStatusBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: NetlifyStatusBar/NetlifyStatusBar.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SPARKLE_APPCAST_URL: "https://azwandi.github.io/netlify-status-bar/appcast.xml"
        SPARKLE_PUBLIC_ED_KEY: ""
    dependencies:
      - package: Sparkle

  NetlifyStatusBarTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: NetlifyStatusBarTests
        excludes:
          - "**/*.gitkeep"
    dependencies:
      - target: NetlifyStatusBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.azwandi.NetlifyStatusBarTests

schemes:
  NetlifyStatusBar:
    build:
      targets:
        NetlifyStatusBar: all
        NetlifyStatusBarTests: [testing]
    test:
      targets:
        - NetlifyStatusBarTests
    run:
      config: Debug
    archive:
      config: Release
